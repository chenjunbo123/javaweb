<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h1>{{ message }}</h1>
        <h1>{{count}}</h1>
    </div>
    <!-- <h1>{{count}}</h1> -->

    <script type="module">
    import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

    createApp({
        setup() {
        const message = ref('Hello Vue!');
        const count = ref(100);
        return {
            message,count
        }
        }
    }).mount('#app')
    </script>
</body>
</html>
